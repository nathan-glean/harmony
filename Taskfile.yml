# https://taskfile.dev
# Run `task` (or `task --list`) to see available tasks.
version: "3"

vars:
  APP_DIR: app
  # Put rustup's cargo (~/.cargo/bin) on PATH for the command. Task's embedded
  # shell resolves executables against the OS PATH and ignores `env:` overrides,
  # so we export inline; `export` also propagates to children (e.g. Tauri's
  # internal `cargo metadata` call).
  WITH_CARGO: 'export PATH="$HOME/.cargo/bin:$PATH"'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  # ---- Rust workspace (core CLI + Tauri backend) ----

  build:
    desc: Build the Rust workspace (debug)
    cmds:
      - '{{.WITH_CARGO}}; cargo build --workspace'

  build:release:
    desc: Build the Rust workspace (release)
    cmds:
      - '{{.WITH_CARGO}}; cargo build --workspace --release'

  test:
    desc: Run Rust workspace tests
    cmds:
      - '{{.WITH_CARGO}}; cargo test --workspace'

  fmt:
    desc: Format Rust code
    cmds:
      - '{{.WITH_CARGO}}; cargo fmt --all'

  fmt:check:
    desc: Check Rust formatting without writing changes
    cmds:
      - '{{.WITH_CARGO}}; cargo fmt --all --check'

  lint:
    desc: Lint with clippy (warnings as errors)
    cmds:
      - '{{.WITH_CARGO}}; cargo clippy --workspace --all-targets -- -D warnings'

  check:
    desc: Type-check the Rust workspace without producing binaries
    cmds:
      - '{{.WITH_CARGO}}; cargo check --workspace --all-targets'

  run:
    desc: 'Run the harmony CLI, e.g. `task run -- repo list`'
    cmds:
      - '{{.WITH_CARGO}}; cargo run --bin harmony -- {{.CLI_ARGS}}'

  flow:doc:
    desc: Regenerate docs/flow.md from the flow state machine (the CI test guards drift)
    cmds:
      - '{{.WITH_CARGO}}; UPDATE_FLOW_DOC=1 cargo test -p harmony-core --test flow_doc'

  release:
    desc: 'Bump version in lockstep on a release branch, open+merge a PR, then tag `vX.Y.Z` (triggers the build). E.g. `task release -- minor` (or patch|major|X.Y.Z). Requires a clean, in-sync `main` and authed `gh`.'
    cmds:
      - 'node scripts/release.mjs {{.CLI_ARGS}}'

  # ---- Frontend (Vite / React) ----

  app:install:
    desc: Install frontend npm dependencies
    dir: "{{.APP_DIR}}"
    cmds:
      - npm install

  app:dev:
    desc: Start the Vite dev server
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run dev

  app:build:
    desc: Type-check and build the frontend bundle
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run build

  app:typecheck:
    desc: Type-check the frontend without emitting output
    dir: "{{.APP_DIR}}"
    cmds:
      - npx tsc --noEmit

  app:test:
    desc: Run frontend unit tests (Vitest)
    dir: "{{.APP_DIR}}"
    cmds:
      - npm test

  # ---- Tauri desktop app (frontend + Rust backend) ----

  tauri:dev:
    desc: Run the Tauri desktop app in dev mode
    dir: "{{.APP_DIR}}"
    cmds:
      - '{{.WITH_CARGO}}; npm run tauri dev'

  tauri:build:
    desc: Build the Tauri desktop app for distribution
    dir: "{{.APP_DIR}}"
    cmds:
      - '{{.WITH_CARGO}}; npm run tauri build'

  # ---- Aggregates ----

  ci:
    desc: Run formatting, lint, type-check, and tests (what CI should run)
    cmds:
      - task: fmt:check
      - task: lint
      - task: test
      - task: app:typecheck
      - task: app:test

  clean:
    desc: Remove Rust and frontend build artifacts
    cmds:
      - '{{.WITH_CARGO}}; cargo clean'
      - rm -rf {{.APP_DIR}}/dist {{.APP_DIR}}/node_modules
